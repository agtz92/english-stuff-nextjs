name: Import Soro feed

on:
  schedule:
    # Every 4 hours (UTC). GitHub cron may delay during peak load.
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: import-soro
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Soro importer
        run: pnpm import:soro

      - name: Commit and push new posts
        run: |
          if [ -z "$(git status --porcelain feed-blog)" ]; then
            echo "No new posts from Soro feed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feed-blog
          COUNT=$(git diff --cached --name-only feed-blog | wc -l | tr -d ' ')
          git commit -m "Import ${COUNT} post(s) from Soro feed"
          git push
